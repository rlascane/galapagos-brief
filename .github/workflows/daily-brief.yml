name: Daily Briefing

on:
  schedule:
    - cron: "0 10 * * 1-5"
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Não commita (apenas gera e mostra no log)"
        required: false
        default: "false"

permissions:
  contents: write

concurrency:
  group: daily-briefing
  cancel-in-progress: false

jobs:
  generate-and-publish:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Generate brief
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python scripts/generate_brief.py

      - name: Render HTML
        run: python scripts/render.py

      - name: Show preview (head)
        run: |
          echo "----- LATEST JSON (build/) -----"
          ls -la build/ || true
          LATEST=$(ls -t build/*.json | head -1)
          echo "File: $LATEST"
          python -c "import json,sys; d=json.load(open('$LATEST')); print(d['body_md'][:1200])"

      - name: Commit and push
        if: github.event.inputs.dry_run != 'true'
        run: |
          git config user.name  "galapagos-bot"
          git config user.email "actions@users.noreply.github.com"
          git add docs/ build/
          if git diff --staged --quiet; then
            echo "Nada para commitar."
          else
            DATE_TAG=$(date -u +'%Y-%m-%d')
            git commit -m "briefing: edição $DATE_TAG"
            git push
          fi
